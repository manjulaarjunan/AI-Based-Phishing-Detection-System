<!DOCTYPE html>

<html>

<head>

<title>
Reports
</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">


</head>


<body class="bg-light">


<div class="container mt-5">


<div class="card shadow p-4">


<h2 class="text-center">

Phishing Detection Reports

</h2>


<br>


<table class="table table-bordered table-striped">


<thead class="table-dark">


<tr>

<th>ID</th>

<th>Website URL</th>

<th>Status</th>

<th>Threat Level</th>

<th>Date</th>

</tr>


</thead>


<tbody>


<tr th:each="r:${reports}">


<td th:text="${r.id}">
</td>


<td th:text="${r.websiteUrl}">
</td>


<td th:text="${r.detectionStatus}">
</td>


<td th:text="${r.threatLevel}">
</td>


<td th:text="${r.reportDate}">
</td>


</tr>


</tbody>


</table>


<a href="/dashboard"
class="btn btn-dark">

Back Dashboard

</a>


</div>


</div>


</body>

</html>
