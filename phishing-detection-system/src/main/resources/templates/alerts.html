<!DOCTYPE html>

<html>

<head>

<title>
Security Alert
</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">


</head>


<body class="bg-light">


<div class="container mt-5">


<div class="card shadow p-4">


<h2 class="text-center text-danger">

Security Alert Module

</h2>


<p class="text-center">

Phishing Website Warning System

</p>



<form action="/generate-alert"
method="post">


<label>
Enter Suspicious URL
</label>


<input type="text"
name="url"
class="form-control"
placeholder="Enter website URL"
required>


<br>


<button class="btn btn-danger">

Generate Alert

</button>


</form>


<br>



<div th:if="${alert}"
class="alert alert-danger">


<h4>
⚠ SECURITY WARNING
</h4>


Website:

<b th:text="${alert.websiteUrl}">
</b>


<br>


Message:

<b th:text="${alert.alertMessage}">
</b>


<br>


Threat Level:

<b th:text="${alert.threatLevel}">
</b>


<br>


Date:

<b th:text="${alert.alertDate}">
</b>


</div>



<a href="/dashboard"
class="btn btn-dark">

Back Dashboard

</a>



</div>

</div>


</body>

</html>
