<!DOCTYPE html>

<html>

<head>

<title>
Website Monitoring
</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">


</head>


<body class="bg-light">


<div class="container mt-5">


<div class="card shadow p-4">


<h2 class="text-center">
Website Monitoring Module
</h2>


<p class="text-center">
Analyze Website Behavior
</p>



<form action="/scan-website"
method="post">


<label>
Enter Website URL
</label>


<input type="text"
name="url"
class="form-control"
placeholder="Enter website url"
required>


<br>


<button class="btn btn-primary">

Scan Website

</button>


</form>



<br>


<div th:if="${result}"
class="alert alert-warning">


Website:

<b th:text="${result.websiteUrl}">
</b>


<br>


Keyword:

<b th:text="${result.keywordFound}">
</b>


<br>


Status:

<b th:text="${result.status}">
</b>


</div>



<a href="/dashboard"
class="btn btn-dark">

Back Dashboard

</a>



</div>


</div>


</body>

</html>
