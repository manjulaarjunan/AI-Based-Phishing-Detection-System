<!DOCTYPE html>
<html>

<head>

<title>
AI Phishing Detection Dashboard
</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">


<style>

body{
background:#f4f6f9;
}


.sidebar{

height:100vh;
width:250px;
position:fixed;
background:#111827;
padding-top:20px;

}


.sidebar h4{

color:white;
text-align:center;
margin-bottom:30px;

}


.sidebar a{

display:block;
padding:15px;
color:white;
text-decoration:none;

}


.sidebar a:hover{

background:#2563eb;

}


.content{

margin-left:260px;
padding:30px;

}


.card-box{

height:130px;
border-radius:20px;
transition:0.3s;

}


.card-box:hover{

transform:scale(1.05);

}


.card-box h2{

font-size:40px;
font-weight:bold;

}

</style>


</head>



<body>


<!-- Sidebar -->

<div class="sidebar">


<h4>
AI Security
</h4>


<a href="/dashboard">
Dashboard
</a>
<a href="/profile">
Profile
</a>


<a href="/url-analysis">
URL Analysis
</a>


<a href="/website-monitor">
Website Monitoring
</a>

<a href="/ai-detection">
AI Detection
</a>


<a href="/alerts">
Security Alerts
</a>


<a href="/reports">
Reports
</a>


<a href="/logout">
Logout
</a>

</div>



<!-- Main Content -->


<div class="content">


<h2>
AI-Based Phishing Detection System
</h2>


<p>
Welcome to Security Dashboard
</p>


<div class="row mt-4">


<!-- Total Scans -->

<div class="row mt-4">


<!-- Total Scan -->

<div class="col-md-3">

<div class="card shadow card-box bg-primary text-white">

<div class="card-body text-center">

<h5>Total Scans</h5>

<h2 th:text="${total}"></h2>

</div>

</div>

</div>



<!-- Safe -->

<div class="col-md-3">

<div class="card shadow card-box bg-success text-white">

<div class="card-body text-center">

<h5>Safe Websites</h5>

<h2 th:text="${safe}"></h2>

</div>

</div>

</div>




<!-- Suspicious -->

<div class="col-md-3">

<div class="card shadow card-box bg-warning">

<div class="card-body text-center">

<h5>Suspicious Websites</h5>

<h2 th:text="${suspicious}"></h2>

</div>

</div>

</div>




<!-- Phishing -->

<div class="col-md-3">

<div class="card shadow card-box bg-danger text-white">

<div class="card-body text-center">

<h5>Phishing Found</h5>

<h2 th:text="${phishing}"></h2>

</div>

</div>

</div>



<!-- Alerts -->

<div class="col-md-3 mt-3">

<div class="card shadow card-box bg-dark text-white">

<div class="card-body text-center">

<h5>Security Alerts</h5>

<h2 th:text="${alerts}"></h2>

</div>

</div>

</div>


</div>
<br>


<div class="card shadow p-4 mt-4"
style="width:500px">


<h4 class="text-center">
Website Detection Analysis
</h4>


<canvas id="phishingChart">
</canvas>


</div>

</div>

</div>


</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js">
</script>
<script th:inline="javascript">


	let safe = /*[[${safe}]]*/ 0;

	let suspicious = /*[[${suspicious}]]*/ 0;

	let phishing = /*[[${phishing}]]*/ 0;


var ctx =
document.getElementById(
'phishingChart'
);



new Chart(ctx,
{

type:'pie',


data:
{

labels:
[
'Safe Websites',
'Suspicious Websites',
'Phishing Websites'
],


datasets:
[
{

data:
[
safe,
suspicious,
phishing
],

backgroundColor:
[
'green',
'orange',
'red'
]

}

]

}

});


</script>
</body>

</html>
