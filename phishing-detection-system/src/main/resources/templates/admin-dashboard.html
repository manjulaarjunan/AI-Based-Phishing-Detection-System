<!DOCTYPE html>

<html>

<head>

<title>
Admin Dashboard
</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">


</head>


<body>


<div class="container mt-5">


<h1>
AI Security Admin Panel
</h1>
<div class="row mt-4">


<div class="col-md-3">

<div class="card bg-primary text-white p-3 text-center">

<h5>Total Users</h5>

<h2 th:text="${users}"></h2>

</div>

</div>



<div class="col-md-3">

<div class="card bg-success text-white p-3 text-center">

<h5>Total Reports</h5>

<h2 th:text="${reports}"></h2>

</div>

</div>



<div class="col-md-3">

<div class="card bg-danger text-white p-3 text-center">

<h5>Phishing</h5>

<h2 th:text="${phishing}"></h2>

</div>

</div>



<div class="col-md-3">

<div class="card bg-dark text-white p-3 text-center">

<h5>Alerts</h5>

<h2 th:text="${alerts}"></h2>

</div>

</div>


</div>


<div class="row mt-4">


<div class="col-md-4">

<div class="card bg-primary text-white p-4">
	

<h4>
Manage Users
</h4>
<a href="/admin-users"
class="btn btn-light">

View Users

</a>

</div>

</div>



<div class="col-md-4">

<div class="card bg-danger text-white p-4">

<h4>
View Reports
</h4>
<a href="/admin-reports"
class="btn btn-light">

View Reports

</a>

</div>

</div>



<div class="col-md-4">

<div class="card bg-warning p-4">

<h4>
Security Alerts
</h4>
<a href="/admin-alerts"
class="btn btn-light">

View Alerts

</a>

</div>

</div>


</div>


</div>


</body>

</html>
