<!DOCTYPE html>

<html>

<head>

<title>Alerts</title>

<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>


<body>


<div class="container mt-5">


<h2>Security Alerts</h2>


<table class="table table-bordered">

<tr>

<th>ID</th>
<th>Website</th>
<th>Message</th>
<th>Level</th>
<th>Date</th>
<th>Action</th>

</tr>


<tr th:each="a:${alerts}">


<td th:text="${a.id}"></td>

<td th:text="${a.websiteUrl}"></td>

<td th:text="${a.alertMessage}"></td>

<td th:text="${a.threatLevel}"></td>

<td th:text="${a.alertDate}"></td>
<td>


	<a th:href="@{/delete-alert/{id}(id=${a.id})}"
	class="btn btn-danger btn-sm"
	onclick="return confirm('Delete this security alert?')">

	Delete

	</a>


</td>


</tr>


</table>


<a href="/admin-dashboard"
class="btn btn-dark">

Back

</a>


</div>


</body>

</html>
