<!DOCTYPE html>

<html>

<head>

<title>
Users
</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">


</head>


<body>


<div class="container mt-5">


<h2>
Registered Users
</h2>


<table class="table table-bordered">


<tr>

<th>ID</th>

<th>Username</th>

<th>Email</th>

<th>Action</th>

</tr>



<tr th:each="u:${users}">


<td th:text="${u.id}">
</td>


<td th:text="${u.username}">
</td>


<td th:text="${u.email}">
</td>
<td>

	<a th:href="@{/delete-user/{id}(id=${u.id})}"
	class="btn btn-danger btn-sm"
	onclick="return confirm('Are you sure you want to delete this user?')">

	Delete

	</a>

</td>

</tr>


</table>


<a href="/admin-dashboard"
class="btn btn-dark">

Back

</a>


</div>


</body>

</html>
