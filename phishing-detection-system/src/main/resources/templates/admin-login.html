<!DOCTYPE html>

<html>

<head>

<title>Admin Login</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">


</head>


<body class="bg-light">


<div class="container mt-5">


<div class="card shadow p-4 mx-auto"
style="width:400px;">


<h3 class="text-center">
Admin Login
</h3>


<form action="/admin-login"
method="post"
autocomplete="off">


<input type="text"
name="username"
placeholder="Admin Username"
class="form-control mt-3"
autocomplete="off"
value="">


<input type="password"
name="password"
placeholder="Password"
class="form-control mt-3"
autocomplete="new-password"
value="">


<button class="btn btn-dark w-100 mt-3">

Login

</button>


</form>


<p class="text-danger"
th:text="${error}">
</p>


</div>

</div>


</body>

</html>
