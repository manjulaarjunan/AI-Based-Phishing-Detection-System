<!DOCTYPE html>

<html>

<head>

<title>
URL Analysis
</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">


</head>


<body class="bg-light">


<div class="container mt-5">


<div class="card shadow p-4">


<h2 class="text-center">

URL Analysis Module

</h2>


<p class="text-center">

AI Based Phishing Detection

</p>



<form action="/check-url"
method="post">


<label>

Enter Website URL

</label>


<input type="text"
name="url"
class="form-control"
placeholder="https://example.com"
required>



<br>


<button
class="btn btn-primary">

Analyze URL

</button>


</form>



<br>



<div th:if="${result}"
class="alert alert-info">


Website:

<b th:text="${url}"></b>


<br>


Detection Result:


<b th:text="${result}"></b>



</div>



<a href="/dashboard"
class="btn btn-dark">

Back Dashboard

</a>



</div>


</div>



</body>

</html>
