<!DOCTYPE html>

<html>

<head>

<title>Admin Reports</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">


</head>


<body>


<div class="container mt-5">


<h2 class="text-center">
All Phishing Detection Reports
</h2>


<table class="table table-bordered table-striped mt-4">


<thead class="table-dark">

<tr>

<th>ID</th>

<th>User</th>

<th>Website</th>

<th>Status</th>

<th>Threat Level</th>

<th>Date</th>

<th>Action</th>

</tr>

</thead>


<tbody>


<tr th:each="r:${reports}">


<td th:text="${r.id}">
</td>


<td th:text="${r.user != null ? r.user.username : 'No User'}">
</td>


<td th:text="${r.websiteUrl}"></td>

<td th:text="${r.detectionStatus}"></td>

<td th:text="${r.threatLevel}"></td>

<td th:text="${r.reportDate}"></td>
<td>

	<a th:href="@{/delete-report/{id}(id=${r.id})}"
	class="btn btn-danger btn-sm"
	onclick="return confirm('Delete this report?')">

	Delete

	</a>

</td>


</tr>


</tr>


</tbody>
<a href="/download-reports"
class="btn btn-success mb-3">

Download Report

</a>

</table>


<a href="/admin-dashboard"
class="btn btn-dark">

Back Dashboard

</a>


</div>


</body>

</html>
